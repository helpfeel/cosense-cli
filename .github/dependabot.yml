version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    ignore:
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    versioning-strategy: increase
    labels:
      - 'dependencies'
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
